name: build

on:
  push:
    branches: [main]
    paths: ['tools/**', 'requirements.txt', '.github/workflows/build.yml']
  pull_request:
    paths: ['tools/**', 'requirements.txt', '.github/workflows/build.yml']
  workflow_dispatch:

jobs:
  build-and-qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install toolchain
        run: pip install -r requirements.txt

      - name: Build the family from source
        run: python tools/build.py

      - name: Validate (monospace, metrics, naming, GSUB)
        run: python tools/validate.py

      - name: Verify font attribution is the project handle only
        run: python tools/check_identity.py

      - name: Font QA — fontbakery (fail only on FAIL/ERROR)
        run: >
          fontbakery check-universal
          --error-code-on FAIL
          --loglevel WARN
          dist/ttf/*.ttf

      - name: Upload built fonts
        uses: actions/upload-artifact@v4
        with:
          name: shellback-mono-fonts
          path: |
            dist/ttf/*.ttf
            dist/webfonts/*.woff2
