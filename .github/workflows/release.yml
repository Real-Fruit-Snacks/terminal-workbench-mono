name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write        # create the release
  id-token: write        # sign the build provenance
  attestations: write    # record the attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install toolchain
        run: pip install -r requirements.txt

      - name: Build from source
        run: python tools/build.py

      - name: Validate
        run: python tools/validate.py

      - name: Font QA — fontbakery
        run: fontbakery check-universal --error-code-on FAIL --loglevel ERROR dist/ttf/*.ttf

      - name: Regenerate Obsidian snippet (embeds the fresh fonts)
        run: python tools/make_obsidian_snippet.py

      - name: Package release archives + checksums
        run: python tools/package.py

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'build/release/*.zip'

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/release/TerminalWorkbenchMono-TTF.zip
            build/release/TerminalWorkbenchMono-WOFF2.zip
            build/release/TerminalWorkbenchMono-Obsidian.zip
            build/release/TerminalWorkbenchMono-Site.zip
            build/release/SHA256SUMS.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            **Terminal Workbench Mono** — the official monospace of the Terminal Workbench design system. [Live specimen](https://real-fruit-snacks.github.io/terminal-workbench-mono/).

            Want to self-host the specimen site instead? Grab `TerminalWorkbenchMono-Site.zip` — the full site, ready to serve (fonts, CSS, page, GitLab CI file), works fully offline.

            These archives were built from source by this workflow and carry
            signed build provenance:

            ```
            gh attestation verify TerminalWorkbenchMono-TTF.zip --repo Real-Fruit-Snacks/terminal-workbench-mono
            sha256sum -c SHA256SUMS.txt
            ```

            See [CHANGELOG.md](https://github.com/Real-Fruit-Snacks/terminal-workbench-mono/blob/main/CHANGELOG.md) for what changed.
            ---
