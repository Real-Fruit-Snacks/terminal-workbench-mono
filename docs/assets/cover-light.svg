<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" width="1200" height="460" role="img" aria-label="Terminal Workbench Mono — the official typeface of the Terminal Workbench design system, with a specimen preview of disambiguated glyphs, ligatures and box-drawing">
  <title>Terminal Workbench Mono</title>
  <rect x="0.75" y="0.75" width="1198.5" height="458.5" rx="24" fill="#f5f7f4" stroke="#bfcbc5" stroke-width="1.5"/>

  <!-- left column -->
  <text x="68" y="128" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="15" font-weight="600" letter-spacing="2.2" fill="#81918a">OFFICIAL TYPEFACE · TERMINAL WORKBENCH</text>
  <text x="66" y="204" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="58" font-weight="700" letter-spacing="0.5" fill="#17201d">workbench</text>
  <text x="66" y="268" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="58" font-weight="700" letter-spacing="0.5" fill="#17201d">mono</text>
  <rect x="210" y="224" width="13" height="44" rx="2" fill="#007a4d"/>
  <text x="68" y="326" font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, sans-serif" font-size="21" fill="#60706a">Every glyph generated. <tspan fill="#007a4d" font-weight="600">Zero ambiguity.</tspan></text>
  <text x="68" y="384" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="12.5" letter-spacing="1.6" fill="#81918a">6 STYLES · 11 LIGATURES · TERMINAL PACK · SLASHED ZERO · OFL-1.1</text>

  <!-- right column: mock terminal pane -->
  <rect x="624" y="64" width="512" height="332" rx="14" fill="#e2eae5" stroke="#bfcbc5" stroke-width="1.5"/>
  <path d="M638 64 h484 a14 14 0 0 1 14 14 v30 h-512 v-30 a14 14 0 0 1 14 -14 z" fill="#d6e1db"/>
  <line x1="624" y1="108" x2="1136" y2="108" stroke="#bfcbc5" stroke-width="1"/>
  <circle cx="648" cy="86" r="5.5" fill="#c8324c"/>
  <circle cx="668" cy="86" r="5.5" fill="#a46600"/>
  <circle cx="688" cy="86" r="5.5" fill="#007a4d"/>
  <text x="714" y="90" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="12" fill="#81918a">specimen / TerminalWorkbenchMono-Regular</text>

  <!-- disambiguation row -->
  <text x="648" y="170" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="26" font-weight="600" fill="#007a4d" xml:space="preserve">0O   Il1   5S   8B</text>

  <!-- ligature row -->
  <text x="648" y="210" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="20" fill="#006f9e" xml:space="preserve">-&gt;  &lt;-  =&gt;  !=  ==  ===  :=  ::</text>

  <!-- box-drawing sample -->
  <text x="648" y="244" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="15" fill="#34443f" xml:space="preserve">┌─ pane ──────┐</text>
  <text x="648" y="264" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="15" fill="#34443f" xml:space="preserve">│ ░▒▓█  ✓     │</text>
  <text x="648" y="284" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="15" fill="#34443f" xml:space="preserve">└─────────────┘</text>

  <!-- weights row -->
  <text x="648" y="330" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="16" fill="#34443f" font-weight="400">Regular</text>
  <text x="762" y="330" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="16" fill="#34443f" font-weight="500">Medium</text>
  <text x="876" y="330" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="16" fill="#17201d" font-weight="700">Bold</text>
</svg>
